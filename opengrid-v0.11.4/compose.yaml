name: opengrid

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: opengrid
      POSTGRES_USER: opengrid
      POSTGRES_PASSWORD: opengrid
    ports:
      - "5432:5432"
    volumes:
      - opengrid-postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengrid -d opengrid"]
      interval: 5s
      timeout: 5s
      retries: 30

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--store_dir", "/data"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - opengrid-nats:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 30
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opengrid
      MINIO_ROOT_PASSWORD: opengrid-dev-password
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - opengrid-minio:/data

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://opengrid:opengrid@postgres:5432/opengrid
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      FUSION_GATE_M: "250"
      FUSION_MAX_AGE_S: "30"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: opengrid
      MINIO_SECRET_KEY: opengrid-dev-password
      MINIO_SECURE: "false"
      ARTIFACT_BUCKET: opengrid-artifacts
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  simulator:
    build: ./simulator
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  ais-plugin:
    build:
      context: .
      dockerfile: plugins/ais/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      OPENGRID_API_URL: http://api:8000
      PLUGIN_ID: opengrid.ais.reference
      AIS_INPUT_MODE: replay
      AIS_REPLAY_FILE: /data/sample_ais.jsonl
      AIS_REPLAY_INTERVAL_S: "1.5"
    volumes:
      - ./plugins/ais/data:/data:ro
    depends_on:
      api:
        condition: service_healthy

  adsb-plugin:
    build:
      context: .
      dockerfile: plugins/adsb/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENGRID_API_URL: http://api:8000
      PLUGIN_ID: opengrid.adsb.reference
      ADSB_INPUT_MODE: replay
      ADSB_REPLAY_FILE: /data/sample_adsb.jsonl
    volumes:
      - ./plugins/adsb/data:/data:ro
    depends_on:
      api:
        condition: service_healthy


  camera-plugin:
    build:
      context: .
      dockerfile: plugins/camera/Dockerfile
    restart: unless-stopped
    environment:
      OPENGRID_API_URL: http://api:8000
      PLUGIN_ID: opengrid.camera.reference
    depends_on:
      api:
        condition: service_healthy

  ardupilot-sitl:
    image: radarku/ardupilot-sitl
    platform: linux/amd64
    restart: unless-stopped
    tty: true
    environment:
      VEHICLE: ArduCopter
      MODEL: "+"
      LAT: "41.4900"
      LON: "-71.3150"
      ALT: "10"
      DIR: "90"
      SPEEDUP: "1"
    ports:
      - "5760:5760"

  mavlink-plugin:
    build: ./plugins/mavlink
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENGRID_API_URL: http://api:8000
      PLUGIN_ID: opengrid.mavlink.reference
      PYTHONUNBUFFERED: "1"
      MAVLINK_CONNECTION_TYPE: tcp
      MAVLINK_TCP_HOST: ardupilot-sitl
      MAVLINK_TCP_PORT: "5760"
    depends_on:
      api:
        condition: service_healthy
      ardupilot-sitl:
        condition: service_started

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  opengrid-postgres:
  opengrid-nats:
  opengrid-minio:
