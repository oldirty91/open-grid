services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: commongrid
      POSTGRES_USER: commongrid
      POSTGRES_PASSWORD: commongrid
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commongrid -d commongrid"]
      interval: 5s
      timeout: 5s
      retries: 20
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--store_dir", "/data"]
    ports: ["4222:4222", "8222:8222"]
    volumes: ["nats-data:/data"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: commongrid
      MINIO_ROOT_PASSWORD: commongrid-dev-password
    ports: ["9002:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://commongrid:commongrid@postgres:5432/commongrid
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      nats: {condition: service_started}
    volumes: ["./backend/app:/app/app"]
  simulator:
    build: ./simulator
    environment: {API_URL: http://api:8000}
    depends_on: [api]
  web:
    build:
      context: ./frontend
      args: {VITE_API_URL: http://localhost:8000}
    ports: ["8080:80"]
    depends_on: [api]
volumes:
  postgres-data:
  nats-data:
  minio-data:
