name: opengrid

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: opengrid
      POSTGRES_USER: opengrid
      POSTGRES_PASSWORD: opengrid
    ports:
      - "5432:5432"
    volumes:
      - opengrid-postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengrid -d opengrid"]
      interval: 5s
      timeout: 5s
      retries: 30

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--store_dir", "/data"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - opengrid-nats:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opengrid
      MINIO_ROOT_PASSWORD: opengrid-dev-password
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - opengrid-minio:/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://opengrid:opengrid@postgres:5432/opengrid
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      FUSION_GATE_M: "250"
      FUSION_MAX_AGE_S: "30"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  simulator:
    build: ./simulator
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  opengrid-postgres:
  opengrid-nats:
  opengrid-minio:
